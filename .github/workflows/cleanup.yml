---
name: 03 - 🗑پاکسازی پوشه های دانلود

on:
  workflow_dispatch:
    inputs:
      warning:
        description: '⚠️ هشدار: این عملیات تمام فایل‌های داخل پوشه‌های downloads/ و videos/ را حذف خواهد کرد. فقط در صورت اطمینان روی "Run workflow" کلیک کنید.'
        required: false
        default: 'لطفاً این هشدار را قبل از اجرا بخوانید'

jobs:
  delete:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: دریافت مخزن (Checkout repository)
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: پیکربندی Git
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

      - name: پاکسازی و بازسازی پوشه‌های downloads و videos
        run: |
          BRANCH="${GITHUB_REF_NAME}"

          echo "در حال پاکسازی پوشه‌ها"
          echo ""

          # پاکسازی پوشه downloads
          if [ -d "downloads" ]; then
            echo "در حال حذف پوشه downloads..."
            git rm -rf downloads/ 2>/dev/null || true
            rm -rf downloads/ 2>/dev/null || true
          else
            echo "پوشه downloads وجود ندارد، ایجاد می‌شود."
          fi

          mkdir -p downloads
          printf '## خالی\nبرای شروع به تب Actions رفته و از گردش‌کارهای سمت چپ استفاده کنید\n' > downloads/README.md

          git add -f downloads/README.md

          # پاکسازی پوشه videos
          if [ -d "videos" ]; then
            echo "در حال حذف پوشه videos..."
            git rm -rf videos/ 2>/dev/null || true
            rm -rf videos/ 2>/dev/null || true
          else
            echo "پوشه videos وجود ندارد، ایجاد می‌شود."
          fi

          mkdir -p videos
          printf '## خالی\nبرای شروع به تب Actions رفته و از گردش‌کارهای سمت چپ استفاده کنید\n' > videos/README.md

          git add -f videos/README.md

          # بررسی تغییرات
          if git diff --staged --quiet; then
            echo "هیچ تغییری برای commit وجود ندارد."
            exit 0
          fi

          git commit -m "پاکسازی پوشه‌های downloads و videos [skip ci]"

          echo "در حال ارسال تغییرات..."

          RETRY=0
          MAX_RETRIES=5
          while [ $RETRY -lt $MAX_RETRIES ]; do
            RETRY=$((RETRY + 1))

            git fetch origin "$BRANCH" --quiet 2>/dev/null || true
            git rebase origin/"$BRANCH" 2>/dev/null || {
              git rebase --abort 2>/dev/null || true
              git reset --hard HEAD~1 2>/dev/null || true
              git pull --rebase origin "$BRANCH" 2>/dev/null || true

              # بازسازی پوشه‌ها در صورت نیاز
              rm -rf downloads/ 2>/dev/null || true
              mkdir -p downloads
              printf '## خالی\nبرای شروع به تب Actions رفته و از گردش‌کارهای سمت چپ استفاده کنید\n' > downloads/README.md
              git add -f downloads/README.md

              rm -rf videos/ 2>/dev/null || true
              mkdir -p videos
              printf '## خالی\nبرای شروع به تب Actions رفته و از گردش‌کارهای سمت چپ استفاده کنید\n' > videos/README.md
              git add -f videos/README.md

              git commit -m "پاکسازی پوشه‌های downloads و videos [skip ci]" 2>/dev/null || true
            }

            if timeout 60 git push origin HEAD:"$BRANCH" 2>&1; then
              echo ""
              echo "=========================================="
              echo "✅ پوشه‌های downloads و videos با موفقیت پاکسازی شدند!"
              echo "=========================================="
              exit 0
            else
              echo "ارسال ناموفق بود، تلاش مجدد $RETRY/$MAX_RETRIES..."
              sleep $((2 + RANDOM % 5))
            fi
          done

          echo "❌ ارسال پس از $MAX_RETRIES تلاش ناموفق بود"
          exit 1
